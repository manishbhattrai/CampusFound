{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 text-center">

            <!-- Soft Icon -->
            <div class="mb-4">
                <div class="bg-light d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 100px; height: 100px;">
                    <i class="fas fa-exclamation-triangle text-muted fs-1"></i>
                </div>
            </div>

            <!--Message -->
            <h1 class="fw-bold text-dark mb-2">Page Not Found</h1>
            <p class="text-muted mb-5">
                The page you are looking for doesn't exist or has been moved.
            </p>

            <!-- Go Back Button -->
            <a href="{% url 'home' %}" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm">
                <i class="fas fa-arrow-left me-2"></i> Go Back Home
            </a>

        </div>
    </div>
</div>
{% endblock %}
