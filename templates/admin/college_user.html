{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4 p-md-5 rounded-4">
                <h3 class="fw-bold mb-1">Create Staff Account</h3>
                <p class="text-muted small mb-4">Assign a management account to a specific college.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Staff Email (Login ID)</label>
                        <input type="email" name="email" class="form-control bg-light border-0" placeholder="staff@college.edu" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Initial Password</label>
                        <input type="password" name="password" class="form-control bg-light border-0" placeholder="••••••••" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Assigned College</label>
                        <select name="college" class="form-select bg-light border-0" required>
                            <option value="">Select College</option>
                            {% for col in colleges %}
                                <option value="{{ col.id }}">{{ col.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Create Staff Account</button>
                    <a href="{% url 'admin-dashboard' %}" class="btn btn-link w-100 text-muted small mt-2 text-decoration-none text-center">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
